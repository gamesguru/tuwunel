name: Complement

# Standalone entry point for Complement compliance testing, split out of
# main.yml so it shows up as its own status check instead of being buried
# inside the big matrix job. main.yml's own enable_test_complement default
# is off so this is the sole runner of Complement on push/PR.

on:
  push:
    branches:
      - "main"
      - "test"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      checkout:
        type: string
        description: "Checkout commit instead of HEAD"
      enable_crypto:
        type: boolean
        default: true
        description: "Enable Complement Crypto tests"
      enable_debug:
        type: boolean
        default: true
        description: "Also run the test-profile (debug build) compliance pass"
      verbose:
        type: boolean
        default: false
        description: "Verbose Complement output"

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false

jobs:
  complement:
    name: Complement
    uses: ./.github/workflows/test.yml
    with:
      checkout: ${{inputs.checkout || github.sha}}
      cargo_profiles: '["test", "bench"]'
      feat_sets: '["logging"]'
      rust_toolchains: '["nightly"]'
      rust_targets: '["x86_64-unknown-linux-gnu"]'
      sys_names: '["debian"]'
      sys_versions: '["testing-slim"]'
      sys_targets: '["x86_64-v1-linux-gnu", "x86_64-v3-linux-gnu"]'
      machines: '["X64"]'
      # Everything except Complement (and its Crypto/debug variants) is off;
      # this workflow exists to run Complement in isolation.
      enable_doc: 'false'
      enable_unit: 'false'
      enable_bench: 'false'
      enable_memcheck: 'false'
      enable_smoke: 'false'
      enable_nix: 'false'
      enable_rustsdk: 'false'
      enable_mas: 'false'
      enable_playwright: 'false'
      enable_complement: 'true'
      enable_complement_debug: ${{fromJSON(inputs.enable_debug || 'true')}}
      complement_runner: ${{ (github.repository_owner != 'matrix-construct' || github.event.repository.fork || github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'het' }}
      complement_verbose: ${{fromJSON(inputs.verbose || 'false')}}
      # Crypto pulls in extra credentials/resources, so it's excluded on
      # forks the same way main.yml excludes it.
      enable_complement_crypto: >-
        ${{
          fromJSON(inputs.enable_crypto || 'true')
          && !(github.repository_owner != 'matrix-construct' || github.event.repository.fork || github.event.pull_request.head.repo.fork)
        }}
      complement_crypto_verbose: ${{fromJSON(inputs.verbose || 'false')}}
